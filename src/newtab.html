<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>New Tab - Nyra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="newtab.css" />
  </head>
  <body>
    <h1>Nyra</h1>
    <div class="search-bar">
      <input
        type="text"
        id="newtab-search"
        placeholder="Search or enter URL..."
      />
    </div>

    <script src="url-utils.js"></script>
    <script>
      const input = document.getElementById("newtab-search");
      let settings = {
        httpsFirst: true,
        searchEngine: "duckduckgo",
        restoreSession: true,
      };

      if (window.nyra) {
        window.nyra.getSettings().then((nextSettings) => {
          settings = {
            ...settings,
            ...nextSettings,
          };
        });

        window.nyra.onSettingsChanged((nextSettings) => {
          settings = {
            ...settings,
            ...nextSettings,
          };
        });
      }

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const query = window.NyraUrl.normalizeUrlInput(input.value, {
            httpsFirst: settings.httpsFirst,
          });
          if (query) window.location.href = query;
        }
      });
    </script>

  </body>
</html>
