<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>New Tab - Nyra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="newtab.css" />
  </head>
  <body>
    <h1>Nyra</h1>
    <div class="search-bar">
      <input
        type="text"
        id="newtab-search"
        placeholder="Search or enter URL..."
      />
    </div>
    <section class="bookmarks" aria-labelledby="bookmarks-title">
      <h2 id="bookmarks-title">Bookmarks</h2>
      <div id="bookmarks-list" class="bookmarks-list"></div>
    </section>

    <script src="url-utils.js"></script>
    <script>
      const input = document.getElementById("newtab-search");
      const bookmarksList = document.getElementById("bookmarks-list");
      let settings = {
        httpsFirst: true,
        searchEngine: "duckduckgo",
        restoreSession: true,
      };

      if (window.nyra) {
        window.nyra.getSettings().then((nextSettings) => {
          settings = {
            ...settings,
            ...nextSettings,
          };
        });

        window.nyra.getBookmarks().then(renderBookmarks);

        window.nyra.onSettingsChanged((nextSettings) => {
          settings = {
            ...settings,
            ...nextSettings,
          };
        });

        window.nyra.onBookmarksChanged(renderBookmarks);
      }

      function renderBookmarks(bookmarks = []) {
        bookmarksList.innerHTML = "";

        if (!bookmarks.length) {
          const empty = document.createElement("p");
          empty.className = "empty-list";
          empty.textContent = "No bookmarks yet.";
          bookmarksList.appendChild(empty);
          return;
        }

        bookmarks.forEach((bookmark) => {
          const link = document.createElement("a");
          link.href = bookmark.url;
          link.textContent = bookmark.title || bookmark.url;
          link.title = bookmark.url;
          bookmarksList.appendChild(link);
        });
      }

      renderBookmarks();

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const query = window.NyraUrl.normalizeUrlInput(input.value, {
            httpsFirst: settings.httpsFirst,
          });
          if (query) window.location.href = query;
        }
      });
    </script>

  </body>
</html>
